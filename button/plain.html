<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朴素按钮 · Plain Button</title>
  <link rel="stylesheet" href="plain.css" />
</head>
<body>

  <main class="demo">
    <h1 class="demo-title">朴素按钮</h1>
    <p class="demo-desc">去掉装饰，回归按钮的本质</p>

    <!-- Solid 实心 -->
    <section class="demo-group">
      <h2 class="group-label">Solid · 实心</h2>
      <div class="demo-row">
        <button class="plain-btn plain-btn--primary">主要操作</button>
        <button class="plain-btn plain-btn--secondary">次要操作</button>
        <button class="plain-btn plain-btn--danger">危险操作</button>
        <button class="plain-btn plain-btn--primary" disabled>已禁用</button>
      </div>
    </section>

    <!-- Outline 描边 -->
    <section class="demo-group">
      <h2 class="group-label">Outline · 描边</h2>
      <div class="demo-row">
        <button class="plain-btn plain-btn--outline plain-btn--primary">主要操作</button>
        <button class="plain-btn plain-btn--outline plain-btn--secondary">次要操作</button>
        <button class="plain-btn plain-btn--outline plain-btn--danger">危险操作</button>
        <button class="plain-btn plain-btn--outline plain-btn--primary" disabled>已禁用</button>
      </div>
    </section>

    <!-- Ghost 幽灵 -->
    <section class="demo-group">
      <h2 class="group-label">Ghost · 幽灵</h2>
      <div class="demo-row">
        <button class="plain-btn plain-btn--ghost plain-btn--primary">主要操作</button>
        <button class="plain-btn plain-btn--ghost plain-btn--secondary">次要操作</button>
        <button class="plain-btn plain-btn--ghost plain-btn--danger">危险操作</button>
        <button class="plain-btn plain-btn--ghost plain-btn--primary" disabled>已禁用</button>
      </div>
    </section>

    <!-- 尺寸 -->
    <section class="demo-group">
      <h2 class="group-label">尺寸</h2>
      <div class="demo-row demo-row--center">
        <button class="plain-btn plain-btn--primary plain-btn--sm">小</button>
        <button class="plain-btn plain-btn--primary">中</button>
        <button class="plain-btn plain-btn--primary plain-btn--lg">大</button>
      </div>
    </section>
  </main>

</body>
</html>
