<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>彩色流光按钮</title>
  <link rel="stylesheet" href="flow-color.css" />
</head>
<body>
  <div class="wrapper">
    <!-- 彩色光环（外层） -->
    <div class="aura-ring" aria-hidden="true"></div>

    <!-- 彩色流光粒子 -->
    <div class="flow-particles" aria-hidden="true"></div>

    <button class="flow-btn">
      <!-- 流光边框 -->
      <span class="flow-btn-inner" aria-hidden="true"></span>
      <span class="btn-text">✨ 流光溢彩</span>
    </button>
  </div>
</body>
</html>
