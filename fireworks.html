<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎆 烟花绽放</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const dpr = window.devicePixelRatio || 1;

        function resizeCanvas() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }
        resizeCanvas();

        const W = () => window.innerWidth;
        const H = () => window.innerHeight;

        // ========== 粒子上限 ==========
        const MAX_PARTICLES = 500;
        function trimParticles() {
            if (particles.length > MAX_PARTICLES) {
                particles.splice(0, particles.length - MAX_PARTICLES);
            }
        }

        // ========== 风 ==========
        let wind = 0;

        // ========== 背景星星 ==========
        const stars = [];
        function initStars() {
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * W(),
                    y: Math.random() * H(),
                    r: Math.random() * 1.5 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.02 + 0.005
                });
            }
        }
        initStars();

        function drawStars() {
            for (const s of stars) {
                s.twinkle += s.speed;
                const alpha = 0.3 + Math.sin(s.twinkle) * 0.4;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }

        // ========== 城市剪影 ==========
        const buildings = [];
        function generateCity() {
            buildings.length = 0;
            const w = W();
            const h = H();
            const groundY = h - 80;
            let x = 0;
            while (x < w) {
                const bw = 20 + Math.random() * 45;
                const bh = 30 + Math.random() * 120;
                buildings.push({
                    x, y: groundY - bh,
                    w: bw, h: bh,
                    windows: []
                });
                // 窗户
                const winCount = Math.floor(Math.random() * 5) + 2;
                for (let i = 0; i < winCount; i++) {
                    buildings[buildings.length - 1].windows.push({
                        wx: 5 + Math.random() * (bw - 10),
                        wy: 8 + Math.random() * (bh - 15),
                        lit: Math.random() < 0.5,
                        ww: 4 + Math.random() * 4,
                        wh: 5 + Math.random() * 4,
                    });
                }
                x += bw;
            }
        }
        generateCity();

        function drawCity() {
            const groundY = H() - 80;
            // 渐变地面
            const grad = ctx.createLinearGradient(0, groundY, 0, H());
            grad.addColorStop(0, 'rgba(30, 30, 50, 0.6)');
            grad.addColorStop(0.3, 'rgba(20, 25, 40, 0.8)');
            grad.addColorStop(1, 'rgba(10, 15, 25, 1)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, groundY, W(), 80);

            // 建筑
            for (const b of buildings) {
                ctx.fillStyle = 'rgba(20, 22, 35, 0.85)';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = 'rgba(40, 42, 60, 0.5)';
                ctx.lineWidth = 0.5;
                ctx.strokeRect(b.x, b.y, b.w, b.h);

                for (const win of b.windows) {
                    if (win.lit) {
                        const brightness = 0.3 + Math.random() * 0.1;
                        ctx.fillStyle = `rgba(255, 220, 150, ${brightness})`;
                    } else {
                        ctx.fillStyle = 'rgba(30, 35, 55, 0.6)';
                    }
                    ctx.fillRect(b.x + win.wx, b.y + win.wy, win.ww, win.wh);
                }
            }

            // 地面光晕
            const glGrad = ctx.createLinearGradient(0, groundY, 0, groundY + 30);
            glGrad.addColorStop(0, 'rgba(60, 55, 80, 0.2)');
            glGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glGrad;
            ctx.fillRect(0, groundY, W(), 30);
        }

        // ========== 烟雾粒子 ==========
        class Smoke {
            constructor(x, y, opts = {}) {
                this.x = x;
                this.y = y;
                this.size = opts.size || (8 + Math.random() * 20);
                this.maxSize = opts.maxSize || (this.size + 15 + Math.random() * 25);
                this.alpha = opts.alpha || (0.2 + Math.random() * 0.15);
                this.decay = opts.decay || (0.003 + Math.random() * 0.005);
                this.vy = opts.vy || (-0.15 - Math.random() * 0.2);
                this.vx = opts.vx || ((Math.random() - 0.5) * 0.3);
                this.life = 0;
                this.maxLife = 120 + Math.floor(Math.random() * 80);
                this.type = opts.type || 'rocket'; // 'rocket' 或 'explosion'
            }

            update() {
                this.life++;
                this.x += this.vx + wind * 0.3;
                this.y += this.vy;
                this.size += 0.15 + Math.random() * 0.2;
                if (this.size > this.maxSize) this.size = this.maxSize;
                this.alpha -= this.decay;
                // 缓慢扩散
                this.vx += (Math.random() - 0.5) * 0.01;
                this.vy += (Math.random() - 0.5) * 0.005;
            }

            draw() {
                if (this.alpha <= 0) return;
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                if (this.type === 'explosion') {
                    grad.addColorStop(0, `rgba(200, 195, 190, ${this.alpha * 0.2})`);
                    grad.addColorStop(0.4, `rgba(180, 175, 170, ${this.alpha * 0.3})`);
                    grad.addColorStop(0.7, `rgba(140, 138, 135, ${this.alpha * 0.2})`);
                    grad.addColorStop(1, `rgba(100, 100, 100, 0)`);
                } else {
                    grad.addColorStop(0, `rgba(220, 215, 210, ${this.alpha * 0.15})`);
                    grad.addColorStop(0.5, `rgba(190, 185, 180, ${this.alpha * 0.25})`);
                    grad.addColorStop(1, `rgba(120, 120, 120, 0)`);
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            }

            get dead() {
                return this.alpha <= 0 || this.life > this.maxLife;
            }
        }

        const smokes = [];

        // ========== 爆炸闪光 ==========
        class Flash {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 60 + Math.random() * 40;
                this.alpha = 0.8;
                this.color = color;
            }

            update() {
                this.radius += 4;
                this.alpha -= 0.04;
            }

            draw() {
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                grad.addColorStop(0, this.color.replace('1)', this.alpha + ')'));
                grad.addColorStop(0.4, this.color.replace('1)', this.alpha * 0.5 + ')'));
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            }

            get dead() { return this.alpha <= 0; }
        }

        const flashes = [];

        // ========== 烟花粒子 ==========
        class Particle {
            constructor(x, y, hue, opts = {}) {
                this.x = x;
                this.y = y;
                this.baseHue = hue;
                // 金色/银色/白色闪点
                const sparkleRoll = Math.random();
                this.isSparkle = opts.isSparkle || false;
                if (!opts.isSparkle && opts.type !== 'sparkle') {
                    if (sparkleRoll < 0.08) {
                        this.isSparkle = true;
                        this.sparkleType = 'gold';
                    } else if (sparkleRoll < 0.14) {
                        this.isSparkle = true;
                        this.sparkleType = 'silver';
                    } else if (sparkleRoll < 0.18) {
                        this.isSparkle = true;
                        this.sparkleType = 'white';
                    }
                }
                if (this.isSparkle) {
                    opts.decay = 0.015 + Math.random() * 0.015;
                    opts.maxTrail = 3 + Math.floor(Math.random() * 3);
                }

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = opts.decay ?? (Math.random() * 0.02 + 0.01);
                this.friction = opts.friction ?? (0.98 + Math.random() * 0.015);
                this.gravity = opts.gravity ?? (0.04 + Math.random() * 0.04);
                this.size = opts.size ?? (2 + Math.random() * 3);
                this.trail = [];
                this.maxTrail = opts.maxTrail ?? (4 + Math.floor(Math.random() * 3));
                this.explosionType = opts.type || 'peony';
                this.canSubExplode = opts.canSubExplode ?? false;
                this.hasSubExploded = false;
                this.life = 0;
            }

            update() {
                this.life++;
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) this.trail.shift();

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.vx += wind;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;

                // 二次爆炸
                if (this.canSubExplode && !this.hasSubExploded && this.alpha < 0.35 && this.alpha > 0.05) {
                    this.hasSubExploded = true;
                    createSubExplosion(this.x, this.y, this.baseHue + Math.random() * 60 - 30);
                }
            }

            draw() {
                const px = (this.x + 0.5) | 0;
                const py = (this.y + 0.5) | 0;
                const currentSize = this.size * (0.3 + this.alpha * 0.7);
                const hueShift = this.baseHue + (1 - this.alpha) * 30;

                // === 闪点粒子 ===
                if (this.isSparkle) {
                    ctx.beginPath();
                    ctx.arc(px, py, currentSize * 1.2, 0, Math.PI * 2);
                    if (this.sparkleType === 'gold') {
                        ctx.fillStyle = `rgba(255, 215, 50, ${this.alpha})`;
                    } else if (this.sparkleType === 'silver') {
                        ctx.fillStyle = `rgba(220, 225, 235, ${this.alpha})`;
                    } else {
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                    }
                    ctx.fill();
                    // 星光十字
                    ctx.beginPath();
                    ctx.arc(px - currentSize * 2.5, py, currentSize * 0.5, 0, Math.PI * 2);
                    ctx.arc(px + currentSize * 2.5, py, currentSize * 0.5, 0, Math.PI * 2);
                    ctx.arc(px, py - currentSize * 2.5, currentSize * 0.5, 0, Math.PI * 2);
                    ctx.arc(px, py + currentSize * 2.5, currentSize * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.5})`;
                    ctx.fill();
                    return;
                }

                // 拖尾
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const ratio = i / this.trail.length;
                    const a = ratio * this.alpha * 0.25;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, currentSize * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hueShift}, 100%, ${35 + ratio * 30}%, ${a})`;
                    ctx.fill();
                }

                // 主体发光
                const grad = ctx.createRadialGradient(px, py, 0, px, py, currentSize * 1.6);
                grad.addColorStop(0, `hsla(${hueShift}, 100%, 95%, ${this.alpha})`);
                grad.addColorStop(0.25, `hsla(${hueShift}, 100%, 70%, ${this.alpha * 0.9})`);
                grad.addColorStop(0.6, `hsla(${hueShift}, 100%, 50%, ${this.alpha * 0.5})`);
                grad.addColorStop(1, `hsla(${hueShift}, 100%, 40%, 0)`);
                ctx.beginPath();
                ctx.arc(px, py, currentSize * 1.6, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                // 菊花型粒子尖端闪光
                if (this.explosionType === 'chrysanthemum' && this.alpha > 0.3) {
                    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy) || 1;
                    const tipX = px + (this.vx / speed) * currentSize * 2.5;
                    const tipY = py + (this.vy / speed) * currentSize * 2.5;
                    ctx.beginPath();
                    ctx.arc(tipX, tipY, 1.8, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.9})`;
                    ctx.fill();
                }
            }

            get dead() {
                return this.alpha <= 0;
            }
        }

        // ========== 二次爆炸 ==========
        function createSubExplosion(x, y, hue) {
            const count = 10 + Math.floor(Math.random() * 10);
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                const p = new Particle(x, y, hue, {
                    decay: 0.03 + Math.random() * 0.02,
                    friction: 0.97,
                    gravity: 0.03 + Math.random() * 0.03,
                    size: 1.5 + Math.random() * 2,
                    maxTrail: 3 + Math.floor(Math.random() * 2),
                    canSubExplode: false,
                });
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                particles.push(p);
            }
        }

        // ========== 上升的烟花弹 ==========
        class Rocket {
            constructor() {
                this.x = Math.random() * W() * 0.6 + W() * 0.2;
                this.y = H();
                this.targetY = Math.random() * H() * 0.4 + H() * 0.1;
                this.vy = -(Math.random() * 3 + 5);
                this.trail = [];
                this.smokeTimer = 0;
                this.exploded = false;
                // 随机爆炸形态
                const r = Math.random();
                if (r < 0.35)      this.type = 'peony';
                else if (r < 0.60) this.type = 'willow';
                else if (r < 0.80) this.type = 'chrysanthemum';
                else               this.type = 'ring';
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 10) this.trail.shift();
                this.x += wind * 0.3;
                this.y += this.vy;
                this.vy += 0.04;

                // 生成上升烟雾
                this.smokeTimer++;
                if (this.smokeTimer % 3 === 0) {
                    smokes.push(new Smoke(this.x + (Math.random() - 0.5) * 4, this.y, {
                        size: 4 + Math.random() * 8,
                        maxSize: 12 + Math.random() * 15,
                        alpha: 0.12 + Math.random() * 0.1,
                        decay: 0.004 + Math.random() * 0.004,
                        vy: -0.1 - Math.random() * 0.15,
                        vx: (Math.random() - 0.5) * 0.2,
                        type: 'rocket',
                    }));
                }

                if (this.y <= this.targetY) this.exploded = true;
            }

            draw() {
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const a = (i / this.trail.length) * 0.7;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 200, ${a})`;
                    ctx.fill();
                }
                const rx = (this.x + 0.5) | 0;
                const ry = (this.y + 0.5) | 0;
                ctx.beginPath();
                ctx.arc(rx, ry, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(rx, ry, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 200, 0.3)';
                ctx.fill();
            }

            explode() {
                const hue = Math.random() * 360;

                // 中心闪光
                flashes.push(new Flash(this.x, this.y, `hsla(${hue}, 100%, 60%, 1)`));

                // 爆炸烟雾 (灰白色烟雾团缓慢扩散)
                const smokeCount = 10 + Math.floor(Math.random() * 10);
                for (let i = 0; i < smokeCount; i++) {
                    smokes.push(new Smoke(this.x + (Math.random() - 0.5) * 30, this.y + (Math.random() - 0.5) * 20, {
                        size: 15 + Math.random() * 20,
                        maxSize: 40 + Math.random() * 50,
                        alpha: 0.15 + Math.random() * 0.1,
                        decay: 0.002 + Math.random() * 0.003,
                        vy: -0.3 - Math.random() * 0.3,
                        vx: (Math.random() - 0.5) * 0.4,
                        type: 'explosion',
                    }));
                }

                // 按形态爆炸
                switch (this.type) {
                    case 'peony':         this.explodePeony(hue);         break;
                    case 'willow':        this.explodeWillow(hue);       break;
                    case 'chrysanthemum': this.explodeChrysanthemum(hue); break;
                    case 'ring':          this.explodeRing(hue);         break;
                    default:              this.explodePeony(hue);
                }

                wind = (Math.random() - 0.5) * 0.04;
            }

            // ---- 🎆 牡丹型 ----
            explodePeony(hue) {
                const count = 70 + Math.floor(Math.random() * 30);
                const primaryHue = hue;
                const secondaryHue = hue + 40 + Math.random() * 80;
                const hasCrackle = Math.random() < 0.3;

                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
                    const speed = Math.random() * 3 + 3;
                    const h = Math.random() < 0.7 ? primaryHue : secondaryHue;
                    const p = new Particle(this.x, this.y, h, {
                        type: 'peony',
                        canSubExplode: Math.random() < 0.12,
                    });
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                    particles.push(p);
                }

                if (hasCrackle) {
                    const cc = 20 + Math.floor(Math.random() * 15);
                    for (let i = 0; i < cc; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 4 + 2;
                        const p = new Particle(this.x, this.y, primaryHue + 30, {
                            decay: 0.03 + Math.random() * 0.03,
                            size: 1 + Math.random() * 1,
                            maxTrail: 2,
                            gravity: 0.06,
                            canSubExplode: false,
                        });
                        p.vx = Math.cos(angle) * speed;
                        p.vy = Math.sin(angle) * speed;
                        particles.push(p);
                    }
                }
            }

            // ---- 🌿 垂柳型 - 减少粒子数 + 优化 ----
            explodeWillow(hue) {
                const count = 60 + Math.floor(Math.random() * 30); // 原100-150
                for (let i = 0; i < count; i++) {
                    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
                    const speed = Math.random() * 4 + 2;
                    const h = hue + Math.random() * 40 - 20;
                    const p = new Particle(this.x, this.y, h, {
                        type: 'willow',
                        gravity: 0.08 + Math.random() * 0.06,
                        decay: 0.008 + Math.random() * 0.01,   // 更快消失
                        maxTrail: 8 + Math.floor(Math.random() * 4), // 缩短拖尾
                        size: 1.5 + Math.random() * 2,
                        canSubExplode: false,
                    });
                    p.vx = Math.cos(angle) * speed * 0.6;
                    p.vy = Math.sin(angle) * speed * 0.8;
                    particles.push(p);
                }

                // 金色拖尾粒子 — 也减少
                const extraCount = 10 + Math.floor(Math.random() * 10); // 原20-35
                for (let i = 0; i < extraCount; i++) {
                    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.4;
                    const speed = Math.random() * 3 + 1;
                    const p = new Particle(this.x, this.y, 45 + Math.random() * 15, {
                        type: 'willow',
                        gravity: 0.12 + Math.random() * 0.04,
                        decay: 0.015,
                        maxTrail: 8,
                        size: 1,
                        canSubExplode: false,
                    });
                    p.vx = Math.cos(angle) * speed * 0.3;
                    p.vy = Math.sin(angle) * speed * 0.9;
                    particles.push(p);
                }
            }

            // ---- ⭐ 菊花型 ----
            explodeChrysanthemum(hue) {
                const count = 40 + Math.floor(Math.random() * 20);
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.15;
                    const speed = Math.random() * 3 + 6;
                    const p = new Particle(this.x, this.y, hue, {
                        type: 'chrysanthemum',
                        decay: 0.008 + Math.random() * 0.008,
                        maxTrail: 8 + Math.floor(Math.random() * 6),
                        size: 2 + Math.random() * 2,
                        canSubExplode: Math.random() < 0.08,
                    });
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                    particles.push(p);
                }
            }

            // ---- ○ 环型 ----
            explodeRing(hue) {
                const count = 35 + Math.floor(Math.random() * 15);
                const innerHue = hue;
                const outerHue = hue + 180;
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.15;
                    const speed = 3.5 + Math.random() * 1.5;
                    const h = i < count / 2 ? outerHue : innerHue;
                    const p = new Particle(this.x, this.y, h, {
                        type: 'ring',
                        gravity: 0.02,
                        decay: 0.015 + Math.random() * 0.01,
                        size: 2 + Math.random() * 2,
                        maxTrail: 4,
                        canSubExplode: Math.random() < 0.1,
                    });
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                    particles.push(p);
                }
            }
        }

        const particles = [];
        const rockets = [];
        let lastSpawn = 0;

        function spawnRocket() {
            rockets.push(new Rocket());
        }

        // ========== 倒影 (水面/地面反射) ==========
        function drawReflection() {
            const groundY = H() - 80;
            // 对地面区域做半透明垂直翻转叠加
            const imgData = ctx.getImageData(0, groundY, W(), 40);
            if (!imgData.data.length) return;
            // 翻转并叠加到地面
            ctx.save();
            ctx.globalAlpha = 0.12;
            for (let row = 0; row < 20; row++) {
                const srcY = groundY + row;
                const dstY = groundY + 40 + row;
                if (dstY > H()) break;
                const srcRow = new Uint8ClampedArray(
                    imgData.data.buffer, row * W() * 4, W() * 4
                );
                const dstRow = ctx.getImageData(0, dstY, W(), 1);
                for (let x = 0; x < W() * 4; x++) {
                    dstRow.data[x] = Math.min(255, dstRow.data[x] + srcRow[x] * 0.3);
                }
                ctx.putImageData(dstRow, 0, dstY);
            }
            ctx.restore();
        }

        // ========== 动画循环 ==========
        function animate(time) {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.25)';
            ctx.fillRect(0, 0, W(), H());

            drawStars();
            drawCity();

            // 生成新烟花
            if (time - lastSpawn > 400 + Math.random() * 600) {
                spawnRocket();
                if (Math.random() < 0.3) spawnRocket();
                lastSpawn = time;
            }

            // 火箭
            for (let i = rockets.length - 1; i >= 0; i--) {
                const r = rockets[i];
                r.update();
                if (r.exploded) {
                    r.explode();
                    rockets.splice(i, 1);
                } else {
                    r.draw();
                }
            }

            // 闪光
            for (let i = flashes.length - 1; i >= 0; i--) {
                const f = flashes[i];
                f.update();
                if (f.dead) {
                    flashes.splice(i, 1);
                } else {
                    f.draw();
                }
            }

            // 烟雾 (先画在粒子下面)
            for (let i = smokes.length - 1; i >= 0; i--) {
                const s = smokes[i];
                s.update();
                if (s.dead) {
                    smokes.splice(i, 1);
                } else {
                    s.draw();
                }
            }

            // 粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.dead) {
                    particles.splice(i, 1);
                } else {
                    p.draw();
                }
            }

            // 粒子上限控制
            trimParticles();

            // 倒影
            drawReflection();

            requestAnimationFrame(animate);
        }

        // ========== 窗口调整 ==========
        window.addEventListener('resize', () => {
            resizeCanvas();
            stars.length = 0;
            initStars();
            generateCity();
        });

        // ========== 点击生成烟花 ==========
        canvas.addEventListener('click', (e) => {
            const r = new Rocket();
            r.x = e.clientX;
            r.targetY = e.clientY;
            rockets.push(r);
        });

        animate(0);
    </script>
</body>
</html>
