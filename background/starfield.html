<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 星空</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #starCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
            z-index: 0;
        }

        .overlay {
            position: relative;
            z-index: 1;
            text-align: center;
            color: rgba(255,255,255,0.85);
            pointer-events: none;
            user-select: none;
            transition: opacity 2s ease;
        }
        .overlay.hidden { opacity: 0; }
        .overlay h1 {
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-shadow: 0 0 40px rgba(120,180,255,0.3), 0 0 80px rgba(120,180,255,0.1);
        }
        .overlay p {
            margin-top: 1rem;
            font-size: clamp(0.85rem, 2vw, 1.15rem);
            letter-spacing: 0.3em;
            opacity: 0.6;
            font-weight: 300;
        }
        .hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            pointer-events: none;
            transition: opacity 1.5s;
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div class="overlay" id="overlay">
        <h1>星辰</h1>
        <p>移动鼠标 · 旋转星空</p>
    </div>

    <div class="hint" id="hint">✦ 移动鼠标旋转星空 · 滚轮变速</div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  3D 星空 —— 鼠标可旋转视角
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let W, H, cx, cy;

        const CFG = {
            starCount: 2200,
            depth: 1200,
            fov: 400,
            speed: 0.8,
            mouseInfluence: 0.003,
            starSizeMin: 0.5,
            starSizeMax: 3.0,
            nebulaAlpha: 0.04,
            meteorCount: 3,
            rotYMax: 0.35,   // 水平旋转最大角度 (rad)
            rotXMax: 0.25,   // 垂直旋转最大角度 (rad)
        };

        // ── 辉光精灵 ──
        let glowSprite;
        function createGlowSprite() {
            const S = 128, h = S >> 1;
            const c = document.createElement('canvas');
            c.width = c.height = S;
            const g = c.getContext('2d');
            const grad = g.createRadialGradient(h, h, 0, h, h, h);
            grad.addColorStop(0, 'rgba(255,255,255,0.5)');
            grad.addColorStop(0.2, 'rgba(255,255,255,0.2)');
            grad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            g.fillStyle = grad;
            g.fillRect(0, 0, S, S);
            return c;
        }

        // ── 银河背景（预渲染）──
        let galaxyCanvas = null;
        function buildGalaxy() {
            const sz = 512;
            const c = document.createElement('canvas');
            c.width = c.height = sz;
            const g = c.getContext('2d');
            const grad = g.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
            grad.addColorStop(0, 'rgba(70,110,240,0.02)');
            grad.addColorStop(0.25, 'rgba(50,70,200,0.012)');
            grad.addColorStop(0.6, 'rgba(30,40,100,0.005)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            g.fillStyle = grad;
            g.fillRect(0, 0, sz, sz);
            return c;
        }

        function drawGalaxy() {
            if (!galaxyCanvas) galaxyCanvas = buildGalaxy();
            const s = Math.max(W, H) * 1.4;
            ctx.save();
            ctx.transform(1, 0.15, -0.25, 0.55, cx * 0.3, 0);
            ctx.drawImage(galaxyCanvas, -s * 0.3, -s * 0.3, s, s);
            ctx.restore();
            ctx.save();
            ctx.globalAlpha = 0.5;
            ctx.transform(1, -0.1, 0.3, 0.5, -cx * 0.2, cy * 0.3);
            ctx.drawImage(galaxyCanvas, -s * 0.3, -s * 0.3, s, s);
            ctx.restore();
        }

        // ═══════════════════════════════════════════════════
        //  恒星（支持 3D 旋转）
        // ═══════════════════════════════════════════════════
        class Star {
            constructor() { this.reset(true); }

            reset(initial) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = Math.cbrt(Math.random()) * CFG.depth * 0.6;

                // 基座标（动画驱动）
                this.bx = r * Math.sin(phi) * Math.cos(theta);
                this.by = r * Math.cos(phi);
                this.bz = initial
                    ? Math.random() * CFG.depth
                    : CFG.depth - Math.random() * 50;

                // 渲染坐标（旋转后）
                this.x = this.bx;
                this.y = this.by;
                this.z = this.bz;

                this.pickColor();
                this.baseSize = CFG.starSizeMin +
                    Math.random() * (CFG.starSizeMax - CFG.starSizeMin);
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.twinkleSpeed = 0.008 + Math.random() * 0.012;
                this.twinkleAmp = 0.25 + Math.random() * 0.45;
            }

            pickColor() {
                const roll = Math.random();
                if (roll < 0.2) {
                    this.r = 255;
                    this.g = 140 + Math.random() * 60 | 0;
                    this.b = 60 + Math.random() * 60 | 0;
                } else if (roll < 0.45) {
                    this.r = 160 + Math.random() * 60 | 0;
                    this.g = 190 + Math.random() * 50 | 0;
                    this.b = 255;
                } else {
                    const v = 220 + Math.random() * 35 | 0;
                    this.r = v;
                    this.g = v;
                    this.b = v + (Math.random() * 35 | 0);
                }
            }

            // 更新基座标（Z 轴推进 + 鼠标偏移）
            update(speed, mx, my) {
                this.bz -= speed;
                this.bx += mx * CFG.mouseInfluence * (this.bz / CFG.depth);
                this.by += my * CFG.mouseInfluence * (this.bz / CFG.depth);

                if (this.bz <= 0 || this.bz > CFG.depth ||
                    Math.abs(this.bx) > CFG.depth * 0.8 ||
                    Math.abs(this.by) > CFG.depth * 0.8) {
                    this.reset(false);
                    return;
                }
                this.twinklePhase += this.twinkleSpeed;
            }

            // 绕 Y 轴（水平）和 X 轴（垂直）旋转
            applyRotation(rotY, rotX) {
                const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                const cosX = Math.cos(rotX), sinX = Math.sin(rotX);

                // 绕 Y 轴旋转
                const rx = this.bx * cosY + this.bz * sinY;
                const ry = this.by;
                const rz = -this.bx * sinY + this.bz * cosY;

                // 绕 X 轴旋转
                this.x = rx;
                this.y = ry * cosX - rz * sinX;
                this.z = ry * sinX + rz * cosX;
            }

            draw() {
                const scale = CFG.fov / (CFG.fov + this.z);
                const px = this.x * scale + cx;
                const py = this.y * scale + cy;
                const size = this.baseSize * scale;
                const depthGlow = 1 - this.z / CFG.depth;

                const twinkle = 1 - this.twinkleAmp * 0.5 +
                    this.twinkleAmp * 0.5 * Math.sin(this.twinklePhase);
                const alpha = Math.max(0.05, depthGlow * (0.6 + 0.4 * twinkle));

                if (size < 0.3 || alpha < 0.02) return;

                const r = this.r, g = this.g, b = this.b;

                // 辉光
                if (size > 0.6 && alpha > 0.1) {
                    const gs = size * (3 + depthGlow * 5);
                    ctx.globalAlpha = alpha * 0.35;
                    ctx.drawImage(glowSprite, px - gs, py - gs, gs * 2, gs * 2);
                    ctx.globalAlpha = 1;

                    if (size > 1.5) {
                        const gs2 = gs * 1.8;
                        ctx.globalAlpha = alpha * 0.12;
                        ctx.drawImage(glowSprite, px - gs2, py - gs2, gs2 * 2, gs2 * 2);
                        ctx.globalAlpha = 1;
                    }
                }

                // 核心
                ctx.beginPath();
                ctx.arc(px, py, Math.max(0.5, size), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(1, alpha * 1.2)})`;
                ctx.fill();

                // 十字
                if (size > 2.0 && alpha > 0.4) {
                    ctx.save();
                    ctx.globalAlpha = alpha * 0.2;
                    ctx.strokeStyle = `rgb(${r},${g},${b})`;
                    ctx.lineWidth = 0.5;
                    const len = size * 5;
                    ctx.beginPath();
                    ctx.moveTo(px - len, py);
                    ctx.lineTo(px + len, py);
                    ctx.moveTo(px, py - len);
                    ctx.lineTo(px, py + len);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }

        // ═══════════════════════════════════════════════════
        //  星云
        // ═══════════════════════════════════════════════════
        class NebulaParticle {
            constructor() { this.reset(); }
            reset() {
                this.bx = (Math.random() - 0.5) * CFG.depth * 1.2;
                this.by = (Math.random() - 0.5) * CFG.depth * 1.2;
                this.bz = Math.random() * CFG.depth;
                this.size = 2 + Math.random() * 6;
                this.hue = 200 + Math.random() * 120;
                this._alpha = CFG.nebulaAlpha * (0.3 + Math.random() * 0.7);
            }
            update(speed, rotY, rotX) {
                this.bz -= speed * 0.15;
                if (this.bz <= 0 || this.bz > CFG.depth) this.reset();

                // 同样旋转
                const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
                const rx = this.bx * cosY + this.bz * sinY;
                const ry = this.by;
                const rz = -this.bx * sinY + this.bz * cosX;
                this.x = rx;
                this.y = ry * cosX - rz * sinX;
                this.z = ry * sinX + rz * cosX;
            }
            draw() {
                const scale = CFG.fov / (CFG.fov + this.z);
                const px = this.x * scale + cx;
                const py = this.y * scale + cy;
                const s = this.size * scale;
                if (s < 0.4) return;
                ctx.beginPath();
                ctx.arc(px, py, s, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue},60%,50%,${this._alpha})`;
                ctx.fill();
            }
        }

        // ═══════════════════════════════════════════════════
        //  流星
        // ═══════════════════════════════════════════════════
        class Meteor {
            constructor() { this.cooldown = 0; this.active = false; }
            resetTimer() { this.active = false; this.cooldown = 200 + Math.random() * 600 | 0; }
            launch() {
                this.active = true;
                const angle = -Math.PI * (0.15 + Math.random() * 0.3);
                const spd = 7 + Math.random() * 12;
                this.vx = Math.cos(angle) * spd;
                this.vy = Math.sin(angle) * spd;
                this.x = Math.random() * W;
                this.y = Math.random() * H * 0.4;
                this.life = 40 + Math.random() * 40 | 0;
                this.maxLife = this.life;
                this.trailLen = 25 + Math.random() * 30;
            }
            update() {
                if (!this.active) { if (--this.cooldown <= 0) this.launch(); return; }
                this.x += this.vx; this.y += this.vy;
                if (--this.life <= 0) this.resetTimer();
            }
            draw() {
                if (!this.active) return;
                const t = 1 - this.life / this.maxLife;
                const alpha = Math.sin(t * Math.PI) * 0.85;
                const tx = this.x - this.vx * this.trailLen * (0.3 + t * 0.3);
                const ty = this.y - this.vy * this.trailLen * (0.3 + t * 0.3);
                const grad = ctx.createLinearGradient(tx, ty, this.x, this.y);
                grad.addColorStop(0, 'rgba(180,210,255,0)');
                grad.addColorStop(1, `rgba(220,235,255,${alpha})`);
                ctx.beginPath();
                ctx.moveTo(tx, ty); ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.2 + t * 0.8;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.fill();
            }
        }

        // ═══════════════════════════════════════════════════
        //  状态
        // ═══════════════════════════════════════════════════
        let stars = [];
        let nebulaParticles = [];
        let meteors = [];
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let rawWarp = 1;
        let smoothWarp = 1;
        let rAF = null;

        function init() {
            glowSprite = createGlowSprite();
            galaxyCanvas = buildGalaxy();
            stars = Array.from({ length: CFG.starCount }, () => new Star());
            nebulaParticles = Array.from({ length: 80 }, () => new NebulaParticle());
            meteors = Array.from({ length: CFG.meteorCount }, () => new Meteor());
            resize();
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2; cy = H / 2;
        }
        window.addEventListener('resize', resize);

        function handleMove(px, py) {
            targetMouseX = (px - cx) / cx;
            targetMouseY = (py - cy) / cy;
        }
        canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        canvas.addEventListener('touchmove', e => {
            const t = e.touches[0];
            handleMove(t.clientX, t.clientY);
        }, { passive: true });
        canvas.addEventListener('touchend', () => { targetMouseX = 0; targetMouseY = 0; });
        canvas.addEventListener('mouseleave', () => { targetMouseX = 0; targetMouseY = 0; });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            rawWarp = Math.max(0.2, Math.min(6, rawWarp + e.deltaY * -0.005));
        }, { passive: false });

        // ═══════════════════════════════════════════════════
        //  动画
        // ═══════════════════════════════════════════════════
        function animate() {
            if (W !== window.innerWidth || H !== window.innerHeight) resize();

            mouseX += (targetMouseX - mouseX) * 0.08;
            mouseY += (targetMouseY - mouseY) * 0.08;
            smoothWarp += (rawWarp - smoothWarp) * 0.1;
            const speed = CFG.speed * smoothWarp;

            // 计算旋转角度
            const rotY = mouseX * CFG.rotYMax;
            const rotX = mouseY * CFG.rotXMax;

            // 清屏
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            ctx.fillRect(0, 0, W, H);

            // ① 银河
            drawGalaxy();

            // ② 星云（随视角旋转）
            for (const p of nebulaParticles) { p.update(speed, rotY, rotX); p.draw(); }

            // ③ 恒星：更新 → 旋转 → 排序 → 绘制
            for (const star of stars) { star.update(speed, mouseX, mouseY); }
            for (const star of stars) { star.applyRotation(rotY, rotX); }
            stars.sort((a, b) => b.z - a.z);
            for (const star of stars) { star.draw(); }

            // ④ 流星
            for (const m of meteors) { m.update(); m.draw(); }

            rAF = requestAnimationFrame(animate);
        }

        setTimeout(() => {
            document.getElementById('overlay')?.classList.add('hidden');
        }, 3500);
        setTimeout(() => {
            const hint = document.getElementById('hint');
            if (hint) hint.style.opacity = '0';
        }, 6000);

        init();
        animate();
    </script>
</body>
</html>
