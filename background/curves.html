<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水墨渐变 · 游丝 · 散逸</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }

        body {
            background: #08080f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        #app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ── 宣纸纹理模拟 ── */
        .paper-bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                /* 微弱颗粒感 */
                repeating-conic-gradient(rgba(255,255,255,0.003) 0% 25%, transparent 0% 50%)
                    0 0 / 240px 240px,
                /* 极淡竖纹 */
                repeating-linear-gradient(
                    to right,
                    transparent 0px, transparent 38px,
                    rgba(255,255,255,0.008) 38px, rgba(255,255,255,0.008) 40px
                );
            pointer-events: none;
        }

        /* ── 环境光晕 ── */
        .ambient-glow {
            position: fixed;
            width: 90vmin; height: 90vmin;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,120,200,0.04) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── 底部信息面板 ── */
        .glass-panel {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            text-align: center;
            color: rgba(255,255,255,0.50);
            padding: 0.6rem 1.8rem;
            border-radius: 14px;
            user-select: none;
            background: rgba(255,255,255,0.025);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 4px 28px rgba(0,0,0,0.30);
            pointer-events: none;
            transition: opacity 1.5s ease;
            opacity: 1;
        }
        .glass-panel.fade-out { opacity: 0; }
        .glass-panel h2 {
            font-size: clamp(0.7rem, 1.3vw, 1.1rem);
            font-weight: 200;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #9aacd4, #6a7aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass-panel p {
            font-size: clamp(0.5rem, 0.7vw, 0.65rem);
            font-weight: 200;
            letter-spacing: 5px;
            opacity: 0.25;
            margin-top: 2px;
            color: #7a8aaa;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="paper-bg"></div>
        <div class="ambient-glow"></div>
        <canvas ref="canvasRef"></canvas>
        <div class="glass-panel" :class="{ 'fade-out': !showPanel }">
            <h2>✦ 水墨 · 游丝 ✦</h2>
            <p>C 形 · S 形 · 散逸飘游</p>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "vue": "https://cdn.jsdelivr.net/npm/vue@3.4/dist/vue.esm-browser.js"
        }
    }
    </script>

    <script type="module">
        import { createApp, ref, onMounted, onUnmounted } from 'vue';

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 工具函数
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const lerp = (a, b, t) => a + (b - a) * t;
        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
        const rand = (min, max) => min + Math.random() * (max - min);
        const randInt = (min, max) => Math.floor(rand(min, max + 1));

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 水墨调色板
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const INK_WASH = [
            // 纯墨 (pure ink)
            ['#0a0a12', '#16161e', '#22223a'],
            ['#0a0a12', '#1a1a26', '#2a2a3e'],
            ['#0c0c14', '#1e1e2a', '#2e2e42'],
            ['#08080e', '#141420', '#202036'],

            // 青墨 (blue-black ink)
            ['#0a0a14', '#121e2a', '#1c2e3e'],
            ['#0c0c16', '#162232', '#203446'],
            ['#080810', '#0e1a24', '#1a2c3c'],

            // 暖墨 (warm ink)
            ['#0e0c0a', '#1c1612', '#2a221e'],
            ['#100c08', '#1e1812', '#2c241e'],
            ['#0a0806', '#16120e', '#221c18'],

            // 淡彩 (subtle color wash)
            ['#0c0c18', '#14202e', '#1e3044'],
            ['#0e0e1a', '#1c202c', '#2a303e'],
            ['#0a0e12', '#141e1e', '#202e2e'],
            ['#0e0a0e', '#1c1620', '#2a2230'],
            ['#0c0e14', '#161e22', '#222e34'],
            ['#0e0c12', '#1c1822', '#2a2432'],

            // 轻彩 (lighter washes - for ethereal effect)
            ['#14142a', '#202e42', '#2e4056'],
            ['#16182a', '#222e3e', '#304054'],
            ['#12162a', '#1e283e', '#2a3a4e'],
            ['#141028', '#1e1e36', '#2c2e48'],
        ];

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 曲线生成（散落全页）
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        /**
         * 生成水墨风格笔画曲线
         * 每条曲线有独立位置（相对于视口百分比）、
         * 变宽度笔触（起笔/中锋/收笔粗细不同）、
         * 独立漂浮参数
         */
        function generateInkCurves(count = 60) {
            const curves = [];

            // 三个景深层次
            const layers = [
                { ratio: 0.20, depthBase: 0.08, depthSpan: 0.18, sizeScale: 0.35, opacityBase: 0.08, opacitySpan: 0.12, countScale: 1.0 },
                { ratio: 0.35, depthBase: 0.28, depthSpan: 0.22, sizeScale: 0.55, opacityBase: 0.15, opacitySpan: 0.20, countScale: 1.8 },
                { ratio: 0.30, depthBase: 0.52, depthSpan: 0.22, sizeScale: 0.75, opacityBase: 0.25, opacitySpan: 0.25, countScale: 2.5 },
                { ratio: 0.15, depthBase: 0.76, depthSpan: 0.20, sizeScale: 1.00, opacityBase: 0.35, opacitySpan: 0.30, countScale: 3.5 },
            ];

            for (const layer of layers) {
                const n = Math.round(count * layer.ratio);
                for (let i = 0; i < n; i++) {
                    const depth = layer.depthBase + rand(0, layer.depthSpan);

                    // 位置：0~1 映射到全页，边缘也有分布
                    const px = rand(-0.10, 1.10);
                    const py = rand(-0.10, 1.10);
                    // 靠近边缘的曲线变小变淡
                    const edgeDist = Math.min(
                        Math.abs(px - 0.5) * 1.6,
                        Math.abs(py - 0.5) * 1.6,
                        0.5
                    ) * 2;
                    const edgeFade = 1 - Math.max(0, edgeDist - 0.6) * 0.6;

                    const paletteIdx = randInt(0, INK_WASH.length - 1);
                    const isC = Math.random() < 0.48;
                    const size = rand(30, 160) * layer.sizeScale;
                    const rotation = rand(0, Math.PI * 2);

                    // 笔触变宽度参数：起笔、中锋、收笔的相对宽度
                    const wMode = randInt(0, 3);
                    let ws, wm, we;
                    switch (wMode) {
                        case 0: /* 起笔重→收笔轻 */ ws = 1.0; wm = 0.7; we = 0.3; break;
                        case 1: /* 起笔轻→收笔重 */ ws = 0.2; wm = 0.6; we = 1.0; break;
                        case 2: /* 两头轻中间重 */   ws = 0.3; wm = 1.0; we = 0.2; break;
                        case 3: /* 均匀渐变 */       ws = 0.5; wm = 0.9; we = 0.4; break;
                    }
                    // 随机微调
                    ws *= rand(0.7, 1.3);
                    wm *= rand(0.7, 1.3);
                    we *= rand(0.7, 1.3);

                    // 最大笔触宽度
                    const maxW = rand(1.5, 12) * (0.3 + depth * 0.7) * (0.8 + size / 200);

                    // 漂浮参数 (慢速、轻柔)
                    const floatSpeed = rand(0.08, 0.28);
                    const floatAmp = rand(0.3, 1.6) * (0.3 + depth * 0.7);
                    const phaseX = rand(0, Math.PI * 2);
                    const phaseY = rand(0, Math.PI * 2);

                    const opacity = (layer.opacityBase + rand(0, layer.opacitySpan)) * edgeFade;

                    const common = {
                        px, py,
                        size,
                        rotation,
                        palette: paletteIdx,
                        ws, wm, we,
                        maxW,
                        floatSpeed, floatAmp, phaseX, phaseY,
                        depth,
                        opacity: clamp(opacity, 0.02, 0.9),
                    };

                    if (isC) {
                        // C 形弧线 —— 开口方向随机
                        const arcStart = rand(0, Math.PI * 0.3);
                        const arcEnd = Math.PI * 2 - rand(0, Math.PI * 0.3);
                        curves.push({ ...common, type: 'C', arcStart, arcEnd });
                    } else {
                        // S 形曲线 —— 振幅随机
                        const amp = rand(0.25, 0.70);
                        curves.push({ ...common, type: 'S', amp });
                    }
                }
            }
            return curves;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 变宽度笔触渲染
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        /**
         * 沿路径采样点，每点计算法线方向和该点宽度，
         * 生成闭合填充路径实现变宽度描边。
         */
        function sampleVariableStroke(ctx, points) {
            if (points.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(
                points[0].x + points[0].nx * points[0].w * 0.5,
                points[0].y + points[0].ny * points[0].w * 0.5
            );
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(
                    points[i].x + points[i].nx * points[i].w * 0.5,
                    points[i].y + points[i].ny * points[i].w * 0.5
                );
            }
            for (let i = points.length - 1; i >= 0; i--) {
                ctx.lineTo(
                    points[i].x - points[i].nx * points[i].w * 0.5,
                    points[i].y - points[i].ny * points[i].w * 0.5
                );
            }
            ctx.closePath();
        }

        /** hex 颜色 + alpha (0-255) → 8位 hex */
        function hexAlpha(hex, a) {
            return hex + Math.floor(a).toString(16).padStart(2, '0');
        }

        /**
         * 绘制C形弧线（水墨笔触）
         */
        function drawInkC(ctx, c, s, t, mx, my) {
            const { px, py, size, rotation, ws, wm, we, maxW, palette,
                    floatSpeed, floatAmp, phaseX, phaseY, depth, opacity,
                    arcStart, arcEnd } = c;

            const colors = INK_WASH[palette % INK_WASH.length];
            const c1 = colors[0];
            const c2 = colors[1 % colors.length];
            const c3 = colors[2 % colors.length];

            // 漂浮偏移
            const fx = Math.sin(t * floatSpeed + phaseX) * floatAmp;
            const fy = Math.cos(t * floatSpeed * 0.7 + phaseY) * floatAmp * 0.8;

            // 鼠标影响 (微风推涌)
            const mouseInfX = mx * 14 * (0.4 + depth * 0.6);
            const mouseInfY = my * 14 * (0.4 + depth * 0.6);

            const r = size * s;
            const steps = Math.max(40, Math.floor(r * 0.8));

            // 视口坐标
            const cx = px * ctx.canvas.width + fx + mouseInfX;
            const cy = py * ctx.canvas.height + fy + mouseInfY;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);

            // 沿弧采样
            const pts = [];
            for (let i = 0; i <= steps; i++) {
                const u = i / steps;
                const angle = arcStart + (arcEnd - arcStart) * u;

                // 宽度沿弧变化 (二次插值)
                const w = (ws * (1 - u) * (1 - u) + wm * 2 * u * (1 - u) + we * u * u) * maxW * s;

                const px2 = r * Math.cos(angle);
                const py2 = r * Math.sin(angle);

                // 弧的法线 = 径向方向
                const nx = Math.cos(angle);
                const ny = Math.sin(angle);

                pts.push({ x: px2, y: py2, nx, ny, w });
            }

            // — 第1层：墨晕渗化 (ink bleed) —
            sampleVariableStroke(ctx, pts.map(p => ({ ...p, w: p.w * 1.8 + 3 * s })));
            ctx.fillStyle = hexAlpha(c1, 20);
            ctx.shadowColor = c1;
            ctx.shadowBlur = 18 * s;
            ctx.fill();
            ctx.shadowBlur = 0;

            // — 第2层：淡墨渲染 (wash layer) —
            sampleVariableStroke(ctx, pts.map(p => ({ ...p, w: p.w * 1.3 + 1 * s })));
            const a2 = Math.round(opacity * 55);
            const grad = ctx.createLinearGradient(-r, -r, r, r);
            grad.addColorStop(0, hexAlpha(c1, a2));
            grad.addColorStop(0.5, hexAlpha(c2, Math.round(a2 * 0.8)));
            grad.addColorStop(1, hexAlpha(c3, Math.round(a2 * 0.9)));
            ctx.fillStyle = grad;
            ctx.shadowColor = c1;
            ctx.shadowBlur = 6 * s;
            ctx.fill();
            ctx.shadowBlur = 0;

            // — 第3层：焦墨核心 (core ink) —
            sampleVariableStroke(ctx, pts.map(p => ({ ...p, w: p.w * 0.45 + 0.3 * s })));
            ctx.fillStyle = hexAlpha(c1, Math.round(opacity * 140));
            ctx.shadowColor = c1;
            ctx.shadowBlur = 2 * s;
            ctx.fill();
            ctx.shadowBlur = 0;

            // — 第4层：枯笔飞白 (dry brush accent, 仅较深曲线) —
            if (opacity > 0.3 && depth > 0.3) {
                const dryPts = pts.filter((_, i) => i % 3 === 0);
                sampleVariableStroke(ctx, dryPts.map(p => ({ ...p, w: p.w * 0.2 })));
                ctx.fillStyle = hexAlpha(c2, Math.round(opacity * 60));
                ctx.fill();
            }

            ctx.restore();
        }

        /**
         * 绘制S形曲线（水墨笔触）
         */
        function drawInkS(ctx, c, s, t, mx, my) {
            const { px, py, size, rotation, ws, wm, we, maxW, palette,
                    floatSpeed, floatAmp, phaseX, phaseY, depth, opacity, amp } = c;

            const colors = INK_WASH[palette % INK_WASH.length];
            const c1 = colors[0];
            const c2 = colors[1 % colors.length];
            const c3 = colors[2 % colors.length];

            // 漂浮偏移
            const fx = Math.sin(t * floatSpeed + phaseX) * floatAmp;
            const fy = Math.cos(t * floatSpeed * 0.7 + phaseY) * floatAmp * 0.8;

            // 鼠标影响
            const mouseInfX = mx * 18 * (0.4 + depth * 0.6);
            const mouseInfY = my * 18 * (0.4 + depth * 0.6);

            const r = size * s;
            const a = amp * r;
            const steps = 48;

            // 视口坐标
            const bx = px * ctx.canvas.width + fx + mouseInfX;
            const by = py * ctx.canvas.height + fy + mouseInfY;

            ctx.save();
            ctx.translate(bx, by);
            ctx.rotate(rotation);

            // S 形贝塞尔：P0→P1→P2→P3
            const p0x = -r * 0.45, p0y = 0;
            const p1x = -r * 0.10, p1y = -a * 0.80;
            const p2x =  r * 0.10, p2y =  a * 0.80;
            const p3x =  r * 0.45, p3y = 0;

            // 采样点并计算切线与法线
            const pts = [];
            for (let i = 0; i <= steps; i++) {
                const u = i / steps;
                const u1 = 1 - u;

                // 贝塞尔位置
                const px2 = u1*u1*u1*p0x + 3*u1*u1*u*p1x + 3*u1*u*u*p2x + u*u*u*p3x;
                const py2 = u1*u1*u1*p0y + 3*u1*u1*u*p1y + 3*u1*u*u*p2y + u*u*u*p3y;

                // 贝塞尔切线
                const tx = 3*u1*u1*(p1x-p0x) + 6*u1*u*(p2x-p1x) + 3*u*u*(p3x-p2x);
                const ty = 3*u1*u1*(p1y-p0y) + 6*u1*u*(p2y-p1y) + 3*u*u*(p3y-p2y);
                const len = Math.sqrt(tx*tx + ty*ty) || 1;
                // 法线 (垂直于切线)
                const nx = -ty / len;
                const ny =  tx / len;

                // 宽度沿S变化
                const w = (ws * (1-u)*(1-u) + wm * 2*u*(1-u) + we * u*u) * maxW * s;

                pts.push({ x: px2, y: py2, nx, ny, w });
            }

            // — 墨晕渗化 —
            sampleVariableStroke(ctx, pts.map(p => ({ ...p, w: p.w * 1.8 + 3 * s })));
            ctx.fillStyle = hexAlpha(c1, 20);
            ctx.shadowColor = c1;
            ctx.shadowBlur = 18 * s;
            ctx.fill();
            ctx.shadowBlur = 0;

            // — 淡墨渲染 —
            sampleVariableStroke(ctx, pts.map(p => ({ ...p, w: p.w * 1.3 + 1 * s })));
            const a2 = Math.round(opacity * 55);
            const grad = ctx.createLinearGradient(-r*0.5, -a*0.5, r*0.5, a*0.5);
            grad.addColorStop(0, hexAlpha(c1, a2));
            grad.addColorStop(0.5, hexAlpha(c2, Math.round(a2 * 0.8)));
            grad.addColorStop(1, hexAlpha(c3, Math.round(a2 * 0.9)));
            ctx.fillStyle = grad;
            ctx.shadowColor = c1;
            ctx.shadowBlur = 6 * s;
            ctx.fill();
            ctx.shadowBlur = 0;

            // — 焦墨核心 —
            sampleVariableStroke(ctx, pts.map(p => ({ ...p, w: p.w * 0.45 + 0.3 * s })));
            ctx.fillStyle = hexAlpha(c1, Math.round(opacity * 140));
            ctx.shadowColor = c1;
            ctx.shadowBlur = 2 * s;
            ctx.fill();
            ctx.shadowBlur = 0;

            // — 枯笔 —
            if (opacity > 0.3 && depth > 0.3) {
                const dryPts = pts.filter((_, i) => i % 3 === 0);
                sampleVariableStroke(ctx, dryPts.map(p => ({ ...p, w: p.w * 0.2 })));
                ctx.fillStyle = hexAlpha(c2, Math.round(opacity * 60));
                ctx.fill();
            }

            ctx.restore();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 主应用
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        createApp({
            setup() {
                const canvasRef = ref(null);
                const showPanel = ref(true);

                // 生成曲线
                const curves = generateInkCurves(64);

                // 交互状态
                const state = {
                    mouseX: 0,
                    mouseY: 0,
                    smoothInfX: 0,
                    smoothInfY: 0,
                    smoothScale: 1,
                    targetScale: 1,
                    wheelScale: 1,
                    time: 0,
                };

                let animId = null;

                // — 事件 —
                function onMouseMove(e) {
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    state.mouseX = (e.clientX / w - 0.5) * 2;
                    state.mouseY = (e.clientY / h - 0.5) * 2;
                }

                function onMouseLeave() {
                    state.mouseX = 0;
                    state.mouseY = 0;
                }

                function onWheel(e) {
                    state.wheelScale = clamp(state.wheelScale - e.deltaY * 0.0005, 0.4, 2.8);
                    state.targetScale = state.wheelScale;
                }

                function onResize() {
                    const canvas = canvasRef.value;
                    if (!canvas) return;
                    canvas.width = window.innerWidth * devicePixelRatio;
                    canvas.height = window.innerHeight * devicePixelRatio;
                }

                function onTouchMove(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    if (!touch) return;
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    state.mouseX = (touch.clientX / w - 0.5) * 2;
                    state.mouseY = (touch.clientY / h - 0.5) * 2;
                }

                function onTouchEnd() {
                    state.mouseX = 0;
                    state.mouseY = 0;
                }

                // — 动画循环 —
                function animate() {
                    const canvas = canvasRef.value;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) return;

                    state.time += 0.016;

                    // 平滑鼠标影响
                    const ease = 0.035;
                    state.smoothInfX = lerp(state.smoothInfX, state.mouseX, ease);
                    state.smoothInfY = lerp(state.smoothInfY, state.mouseY, ease);
                    state.smoothScale = lerp(state.smoothScale, state.targetScale, ease);

                    // 清屏 (极深半透明叠加产生轨迹尾影)
                    ctx.fillStyle = 'rgba(8,8,15,0.25)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 原始 DPR 缩放
                    const dpr = devicePixelRatio;
                    const baseScale = Math.min(canvas.width, canvas.height) / 800 * state.smoothScale;

                    // 按深度排序
                    const sorted = [...curves].sort((a, b) => a.depth - b.depth);

                    for (const c of sorted) {
                        const depthScale = 0.25 + c.depth * 0.75;
                        const s = baseScale * depthScale;

                        if (c.type === 'C') {
                            drawInkC(ctx, c, s, state.time, state.smoothInfX, state.smoothInfY);
                        } else {
                            drawInkS(ctx, c, s, state.time, state.smoothInfX, state.smoothInfY);
                        }
                    }

                    animId = requestAnimationFrame(animate);
                }

                // — 生命周期 —
                onMounted(() => {
                    const canvas = canvasRef.value;
                    if (!canvas) return;

                    canvas.width = window.innerWidth * devicePixelRatio;
                    canvas.height = window.innerHeight * devicePixelRatio;

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseleave', onMouseLeave);
                    document.addEventListener('wheel', onWheel, { passive: true });
                    window.addEventListener('resize', onResize);
                    document.addEventListener('touchmove', onTouchMove, { passive: false });
                    document.addEventListener('touchend', onTouchEnd);

                    setTimeout(() => { showPanel.value = false; }, 5000);

                    animate();
                });

                onUnmounted(() => {
                    if (animId) cancelAnimationFrame(animId);
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseleave', onMouseLeave);
                    document.removeEventListener('wheel', onWheel);
                    window.removeEventListener('resize', onResize);
                    document.removeEventListener('touchmove', onTouchMove);
                    document.removeEventListener('touchend', onTouchEnd);
                });

                return { canvasRef, showPanel };
            }
        }).mount('#app');
    </script>
</body>
</html>
