<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩色渐变曲线 · C 形 S 形 · 鼠标变换</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }

        body {
            background: #05050e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        #app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ── 背景网格 ── */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                repeating-linear-gradient(
                    to right, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px,
                    transparent 1px, transparent 60px
                ),
                repeating-linear-gradient(
                    to bottom, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px,
                    transparent 1px, transparent 60px
                );
            pointer-events: none;
        }

        /* ── 环境光晕 ── */
        .ambient-glow {
            position: fixed;
            width: 80vmin; height: 80vmin;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(120,100,255,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── 底部信息面板 ── */
        .glass-panel {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            text-align: center;
            color: rgba(255,255,255,0.70);
            padding: 0.7rem 2rem;
            border-radius: 16px;
            user-select: none;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 32px rgba(0,0,0,0.35);
            pointer-events: none;
            transition: opacity 1.2s ease;
            opacity: 1;
        }
        .glass-panel.fade-out { opacity: 0; }
        .glass-panel h2 {
            font-size: clamp(0.8rem, 1.6vw, 1.3rem);
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #b4c2ee, #7a8ac8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass-panel p {
            font-size: clamp(0.55rem, 0.8vw, 0.75rem);
            font-weight: 200;
            letter-spacing: 3px;
            opacity: 0.30;
            margin-top: 2px;
            color: #8899cc;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="bg-grid"></div>
        <div class="ambient-glow"></div>
        <canvas ref="canvasRef"></canvas>
        <div class="glass-panel" ref="panelRef" :class="{ 'fade-out': !showPanel }">
            <h2>✦ 渐变曲线 · C 形 S 形 ✦</h2>
            <p>鼠标拖拽旋转 · 滚轮缩放 · 横向拉伸</p>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "vue": "https://cdn.jsdelivr.net/npm/vue@3.4/dist/vue.esm-browser.js"
        }
    }
    </script>

    <script type="module">
        import { createApp, ref, onMounted, onUnmounted } from 'vue';

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 工具函数
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const lerp = (a, b, t) => a + (b - a) * t;
        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
        const rand = (min, max) => min + Math.random() * (max - min);
        const randInt = (min, max) => Math.floor(rand(min, max + 1));

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 调色板
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const PALETTES = [
            ['#ff6b6b', '#feca57'],
            ['#feca57', '#48dbfb'],
            ['#48dbfb', '#ff9ff3'],
            ['#ff9ff3', '#54a0ff'],
            ['#54a0ff', '#5f27cd'],
            ['#5f27cd', '#ff6b6b'],
            ['#1dd1a1', '#feca57'],
            ['#ff6348', '#7bed9f'],
            ['#70a1ff', '#ff6b81'],
            ['#a29bfe', '#fd79a8'],
            ['#00cec9', '#ffeaa7'],
            ['#e17055', '#00b894'],
            ['#f368e0', '#ff9f43'],
            ['#0abde3', '#10ac84'],
            ['#ee5a24', '#a29bfe'],
            ['#5f27cd', '#feca57'],
        ];

        function pickPalette(index) {
            return PALETTES[index % PALETTES.length];
        }

        function hexToRgba(hex, alpha = 1) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 曲线生成
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function createCCurve(opts = {}) {
            const size = opts.size || rand(30, 120);
            return {
                type: 'C',
                x: opts.x || 0,
                y: opts.y || 0,
                size,
                lineWidth: opts.lineWidth || rand(3, 12),
                rotation: opts.rotation || rand(0, Math.PI * 2),
                palette: opts.palette || randInt(0, PALETTES.length - 1),
                phase: opts.phase || rand(0, Math.PI * 2),
                floatAmp: opts.floatAmp || rand(0.3, 1.2),
                floatSpeed: opts.floatSpeed || rand(0.2, 0.6),
                depth: opts.depth || rand(0.3, 1.0),
                glowSize: opts.glowSize || rand(8, 20),
                opacity: opts.opacity ?? rand(0.35, 0.85),
                arcStart: Math.PI * 0.20,
                arcEnd: Math.PI * 1.80,
            };
        }

        function createSCurve(opts = {}) {
            const size = opts.size || rand(40, 140);
            const amp = opts.amp ?? rand(0.3, 0.7);
            return {
                type: 'S',
                x: opts.x || 0,
                y: opts.y || 0,
                size,
                amplitude: size * amp,
                lineWidth: opts.lineWidth || rand(3, 10),
                rotation: opts.rotation || rand(0, Math.PI * 2),
                palette: opts.palette || randInt(0, PALETTES.length - 1),
                phase: opts.phase || rand(0, Math.PI * 2),
                floatAmp: opts.floatAmp || rand(0.3, 1.0),
                floatSpeed: opts.floatSpeed || rand(0.2, 0.6),
                depth: opts.depth || rand(0.3, 1.0),
                glowSize: opts.glowSize || rand(8, 20),
                opacity: opts.opacity ?? rand(0.35, 0.85),
            };
        }

        function generateCurves(count = 48) {
            const curves = [];
            const halfRange = 1.6;
            const depthLayers = [
                { count: 0.25, depthRange: [0.1, 0.35], sizeScale: 0.5, opacityRange: [0.15, 0.35] },
                { count: 0.35, depthRange: [0.35, 0.65], sizeScale: 0.75, opacityRange: [0.30, 0.55] },
                { count: 0.40, depthRange: [0.65, 1.0], sizeScale: 1.0, opacityRange: [0.50, 0.85] },
            ];

            let idx = 0;
            for (const layer of depthLayers) {
                const n = Math.floor(count * layer.count);
                for (let i = 0; i < n; i++) {
                    const depth = rand(layer.depthRange[0], layer.depthRange[1]);
                    const baseSize = rand(40, 160) * layer.sizeScale;
                    const palette = randInt(0, PALETTES.length - 1);
                    const rotation = rand(0, Math.PI * 2);
                    const x = rand(-halfRange, halfRange);
                    const y = rand(-halfRange, halfRange);
                    const phase = rand(0, Math.PI * 2);
                    const isC = Math.random() < 0.5;

                    const common = {
                        x, y,
                        size: baseSize,
                        lineWidth: rand(2, 10) * (0.5 + depth * 0.5),
                        rotation,
                        palette,
                        phase,
                        floatAmp: rand(0.2, 0.8) * depth,
                        floatSpeed: rand(0.15, 0.5),
                        depth,
                        glowSize: rand(5, 18) * depth,
                        opacity: rand(layer.opacityRange[0], layer.opacityRange[1]),
                    };

                    if (isC) {
                        curves.push(createCCurve(common));
                    } else {
                        curves.push(createSCurve({
                            ...common,
                            amp: rand(0.25, 0.65),
                        }));
                    }
                    idx++;
                }
            }
            return curves;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 渲染器
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function drawCCurve(ctx, curve, scale, time) {
            const { x, y, size, lineWidth, rotation, palette, phase,
                    floatAmp, floatSpeed, depth, glowSize, opacity, arcStart, arcEnd } = curve;

            const paletteColors = pickPalette(palette);
            const c1 = paletteColors[0];
            const c2 = paletteColors[1];

            const floatOffset = Math.sin(time * floatSpeed + phase) * floatAmp;
            const r = size * scale;
            const lw = Math.max(1.5, lineWidth * scale * (0.6 + 0.4 * depth));

            ctx.save();

            const px = x * scale + floatOffset * 0.3;
            const py = y * scale + floatOffset * 0.2;
            ctx.translate(px, py);
            ctx.rotate(rotation);

            // — 发光层 —
            ctx.beginPath();
            ctx.arc(0, 0, r, arcStart, arcEnd, false);
            ctx.strokeStyle = hexToRgba(c1, opacity * 0.25);
            ctx.lineWidth = lw + glowSize * scale * 0.5;
            ctx.lineCap = 'round';
            ctx.shadowColor = c1;
            ctx.shadowBlur = glowSize * scale * 1.2;
            ctx.stroke();

            // — 渐变过渡层 —
            const grad = ctx.createLinearGradient(
                r * Math.cos(arcStart), r * Math.sin(arcStart),
                r * Math.cos(arcEnd), r * Math.sin(arcEnd)
            );
            grad.addColorStop(0, hexToRgba(c1, opacity * 0.6));
            grad.addColorStop(0.5, hexToRgba(c2, opacity * 0.5));
            grad.addColorStop(1, hexToRgba(c2, opacity * 0.6));

            ctx.beginPath();
            ctx.arc(0, 0, r, arcStart, arcEnd, false);
            ctx.strokeStyle = grad;
            ctx.lineWidth = lw * 1.1;
            ctx.lineCap = 'round';
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.stroke();

            // — 高光核心线 —
            const gradCore = ctx.createLinearGradient(
                r * Math.cos(arcStart), r * Math.sin(arcStart),
                r * Math.cos(arcEnd), r * Math.sin(arcEnd)
            );
            gradCore.addColorStop(0, hexToRgba(c1, opacity));
            gradCore.addColorStop(0.5, hexToRgba(c2, opacity * 0.8));
            gradCore.addColorStop(1, hexToRgba(c2, opacity));

            ctx.beginPath();
            ctx.arc(0, 0, r, arcStart, arcEnd, false);
            ctx.strokeStyle = gradCore;
            ctx.lineWidth = Math.max(1, lw * 0.45);
            ctx.lineCap = 'round';
            ctx.shadowColor = c1;
            ctx.shadowBlur = 4 * scale;
            ctx.stroke();

            ctx.restore();
        }

        function drawSCurve(ctx, curve, scale, time) {
            const { x, y, size, amplitude, lineWidth, rotation, palette, phase,
                    floatAmp, floatSpeed, depth, glowSize, opacity } = curve;

            const paletteColors = pickPalette(palette);
            const c1 = paletteColors[0];
            const c2 = paletteColors[1];

            const floatOffset = Math.sin(time * floatSpeed + phase) * floatAmp;
            const r = size * scale;
            const amp = amplitude * scale;
            const lw = Math.max(1.5, lineWidth * scale * (0.6 + 0.4 * depth));

            // S 曲线控制点
            const halfLen = r * 0.5;
            const cpOffX = amp * 0.2;
            const cpOffY = amp * 0.85;

            ctx.save();

            const px = x * scale + floatOffset * 0.3;
            const py = y * scale + floatOffset * 0.2;
            ctx.translate(px, py);
            ctx.rotate(rotation);

            // — 发光层 —
            ctx.beginPath();
            ctx.moveTo(-halfLen, 0);
            ctx.bezierCurveTo(-halfLen * 0.2, -cpOffY, halfLen * 0.2, cpOffY, halfLen, 0);
            ctx.strokeStyle = hexToRgba(c1, opacity * 0.20);
            ctx.lineWidth = lw + glowSize * scale * 0.4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = c1;
            ctx.shadowBlur = glowSize * scale * 1.0;
            ctx.stroke();

            // — 渐变过渡层 —
            const grad = ctx.createLinearGradient(-halfLen, -cpOffY, halfLen, cpOffY);
            grad.addColorStop(0, hexToRgba(c1, opacity * 0.55));
            grad.addColorStop(0.4, hexToRgba(c2, opacity * 0.40));
            grad.addColorStop(0.7, hexToRgba(c1, opacity * 0.45));
            grad.addColorStop(1, hexToRgba(c2, opacity * 0.55));

            ctx.beginPath();
            ctx.moveTo(-halfLen, 0);
            ctx.bezierCurveTo(-halfLen * 0.2, -cpOffY, halfLen * 0.2, cpOffY, halfLen, 0);
            ctx.strokeStyle = grad;
            ctx.lineWidth = lw * 1.0;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.stroke();

            // — 高光核心线 —
            const gradCore = ctx.createLinearGradient(-halfLen, -cpOffY, halfLen, cpOffY);
            gradCore.addColorStop(0, hexToRgba(c1, opacity));
            gradCore.addColorStop(0.3, hexToRgba(c2, opacity * 0.7));
            gradCore.addColorStop(0.6, hexToRgba(c1, opacity * 0.6));
            gradCore.addColorStop(1, hexToRgba(c2, opacity));

            ctx.beginPath();
            ctx.moveTo(-halfLen, 0);
            ctx.bezierCurveTo(-halfLen * 0.2, -cpOffY, halfLen * 0.2, cpOffY, halfLen, 0);
            ctx.strokeStyle = gradCore;
            ctx.lineWidth = Math.max(1, lw * 0.40);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = c1;
            ctx.shadowBlur = 3 * scale;
            ctx.stroke();

            ctx.restore();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 主应用
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        createApp({
            setup() {
                const canvasRef = ref(null);
                const panelRef = ref(null);
                const showPanel = ref(true);

                // — 状态 —
                const curves = generateCurves(50);

                // 鼠标交互状态（带平滑）
                const state = {
                    mouseX: 0,          // -1 ~ 1
                    mouseY: 0,            // -1 ~ 1
                    smoothRotX: 0,
                    smoothRotY: 0,
                    smoothScale: 1,
                    smoothStretchX: 1,
                    smoothStretchY: 1,
                    targetRotX: 0,
                    targetRotY: 0,
                    targetScale: 1,
                    targetStretchX: 1,
                    targetStretchY: 1,
                    wheelScale: 1,
                    time: 0,
                };

                let animId = null;
                let canvasW = 0;
                let canvasH = 0;

                // — 鼠标事件 —
                function onMouseMove(e) {
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    state.mouseX = (e.clientX / w - 0.5) * 2;
                    state.mouseY = (e.clientY / h - 0.5) * 2;

                    state.targetRotX = state.mouseY * 0.35;
                    state.targetRotY = state.mouseX * 0.45;
                    state.targetStretchX = 1 + state.mouseX * 0.25;
                    state.targetStretchY = 1 + Math.abs(state.mouseY) * 0.15;
                }

                function onMouseLeave() {
                    state.mouseX = 0;
                    state.mouseY = 0;
                    state.targetRotX = 0;
                    state.targetRotY = 0;
                    state.targetStretchX = 1;
                    state.targetStretchY = 1;
                }

                function onWheel(e) {
                    state.wheelScale = clamp(state.wheelScale - e.deltaY * 0.0006, 0.4, 2.5);
                    state.targetScale = state.wheelScale;
                }

                function onResize() {
                    const canvas = canvasRef.value;
                    if (!canvas) return;
                    canvasW = window.innerWidth;
                    canvasH = window.innerHeight;
                    canvas.width = canvasW * devicePixelRatio;
                    canvas.height = canvasH * devicePixelRatio;
                }

                // — 触摸支持 —
                function onTouchMove(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    if (!touch) return;
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    state.mouseX = (touch.clientX / w - 0.5) * 2;
                    state.mouseY = (touch.clientY / h - 0.5) * 2;
                    state.targetRotX = state.mouseY * 0.35;
                    state.targetRotY = state.mouseX * 0.45;
                    state.targetStretchX = 1 + state.mouseX * 0.25;
                    state.targetStretchY = 1 + Math.abs(state.mouseY) * 0.15;
                }

                function onTouchEnd() {
                    state.mouseX = 0;
                    state.mouseY = 0;
                    state.targetRotX = 0;
                    state.targetRotY = 0;
                    state.targetStretchX = 1;
                    state.targetStretchY = 1;
                }

                // — 动画循环 —
                function animate() {
                    const canvas = canvasRef.value;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) return;

                    state.time += 0.016;

                    // 平滑插值
                    const ease = 0.045;
                    state.smoothRotX = lerp(state.smoothRotX, state.targetRotX, ease);
                    state.smoothRotY = lerp(state.smoothRotY, state.targetRotY, ease);
                    state.smoothScale = lerp(state.smoothScale, state.targetScale, ease);
                    state.smoothStretchX = lerp(state.smoothStretchX, state.targetStretchX, ease);
                    state.smoothStretchY = lerp(state.smoothStretchY, state.targetStretchY, ease);

                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // 总体变换
                    const cx = canvas.width / 2;
                    const cy = canvas.height / 2;
                    const baseScale = Math.min(canvas.width, canvas.height) / 600;

                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.scale(
                        state.smoothScale * state.smoothStretchX,
                        state.smoothScale * state.smoothStretchY
                    );
                    ctx.rotate(state.smoothRotX * 0.02);
                    ctx.transform(
                        1, state.smoothRotX * 0.008,
                        state.smoothRotY * 0.008, 1,
                        0, 0
                    );

                    // 按深度排序（远→近）
                    const sorted = [...curves].sort((a, b) => a.depth - b.depth);

                    for (const c of sorted) {
                        const depthScale = 0.3 + c.depth * 0.7;
                        const s = baseScale * depthScale;

                        if (c.type === 'C') {
                            drawCCurve(ctx, c, s, state.time);
                        } else {
                            drawSCurve(ctx, c, s, state.time);
                        }
                    }

                    ctx.restore();

                    animId = requestAnimationFrame(animate);
                }

                // — 生命周期 —
                onMounted(() => {
                    const canvas = canvasRef.value;
                    if (!canvas) return;

                    canvasW = window.innerWidth;
                    canvasH = window.innerHeight;
                    canvas.width = canvasW * devicePixelRatio;
                    canvas.height = canvasH * devicePixelRatio;
                    canvas.style.width = canvasW + 'px';
                    canvas.style.height = canvasH + 'px';

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseleave', onMouseLeave);
                    document.addEventListener('wheel', onWheel, { passive: true });
                    window.addEventListener('resize', onResize);
                    document.addEventListener('touchmove', onTouchMove, { passive: false });
                    document.addEventListener('touchend', onTouchEnd);

                    // 几秒后淡出面板
                    setTimeout(() => { showPanel.value = false; }, 5000);

                    animate();
                });

                onUnmounted(() => {
                    if (animId) cancelAnimationFrame(animId);
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseleave', onMouseLeave);
                    document.removeEventListener('wheel', onWheel);
                    window.removeEventListener('resize', onResize);
                    document.removeEventListener('touchmove', onTouchMove);
                    document.removeEventListener('touchend', onTouchEnd);
                });

                return { canvasRef, panelRef, showPanel };
            }
        }).mount('#app');
    </script>
</body>
</html>
